services:
  postgres:
    image: postgres:16-alpine
    container_name: financiero-db
    environment:
      POSTGRES_USER: financiero
      POSTGRES_PASSWORD: financiero_dev
      POSTGRES_DB: financiero
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financiero"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: financiero-db-test
    environment:
      POSTGRES_USER: financiero
      POSTGRES_PASSWORD: financiero_test
      POSTGRES_DB: financiero_test
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financiero"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
